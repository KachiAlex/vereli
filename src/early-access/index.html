<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Early Access — Vereli</title>
  <meta name="description" content="Join the Vereli early access list. Be the first to try client operations for service businesses.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0B4F52;
      color: #fff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .ht { font-family:'Inter',sans-serif; }
    .card {
      background: #fff;
      border-radius: 24px;
      width: 100%;
      max-width: 460px;
      padding: 48px 40px;
      color: #062B2D;
      box-shadow: 0 40px 100px rgba(0,0,0,0.25);
    }
    .field {
      width: 100%;
      height: 52px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1.5px solid #E2EBE9;
      background: #FBFBFA;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #062B2D;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field:focus { border-color: #17A39B; box-shadow: 0 0 0 3px rgba(23,163,155,0.12); }
    .field::placeholder { color: #A8B8B6; }
    .btn {
      width: 100%;
      height: 52px;
      border-radius: 12px;
      background: #17A39B;
      color: #fff;
      font-family:'Inter',sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(23,163,155,0.35); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .flbl {
      font-family:'Inter',sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #4A6468;
      margin-bottom: 6px;
      display: block;
    }
    .msg { font-size: 13px; margin-top: 12px; text-align: center; }
    .msg.ok { color: #17A39B; }
    .msg.err { color: #B01C1C; }
    .logo-link { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    @media (max-width: 480px) {
      .card { padding: 32px 24px; border-radius: 20px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <a href="/" class="logo-link mb-8" style="display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:32px;">
      <img src="https://static.kite.ai/image/upload/v1780124564/app/6f6e6a79-05d7-44be-8119-1a2be90d56a3/bg-removed-6f6e6a79-05d7-44be-8119-1a2be90d56a3-7516d98654.png" alt="Vereli" style="height:32px;width:auto;">
      <span class="ht" style="font-size:18px;font-weight:700;color:#0B4F52;letter-spacing:-0.02em;">Vereli</span>
    </a>

    <h1 class="ht" style="font-size:28px;font-weight:800;color:#0B4F52;letter-spacing:-0.03em;margin-bottom:8px;line-height:1.15;">Get early access</h1>
    <p style="font-size:14.5px;color:#6B7C7D;line-height:1.55;margin-bottom:28px;">Join the list and be the first to try Vereli when we open the doors. No spam — just a heads-up when your spot is ready.</p>

    <form id="ea-form" onsubmit="event.preventDefault(); submitEarlyAccess();">
      <div style="margin-bottom:14px;">
        <label class="flbl">Email address <span style="color:#E87070">*</span></label>
        <input type="email" id="ea-email" class="field" placeholder="you@company.com" required>
      </div>
      <div style="margin-bottom:14px;">
        <label class="flbl">Full name</label>
        <input type="text" id="ea-name" class="field" placeholder="Jane Smith">
      </div>
      <div style="margin-bottom:22px;">
        <label class="flbl">Company / workspace</label>
        <input type="text" id="ea-company" class="field" placeholder="Acme Studio">
      </div>
      <button type="submit" id="ea-btn" class="btn">
        <span id="ea-text">Join the early list</span>
        <svg id="ea-spinner" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:spin 1s linear infinite;"><style>@keyframes spin{to{transform:rotate(360deg)}}</style><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/></svg>
      </button>
      <div id="ea-msg" class="msg hidden"></div>
    </form>

    <p style="font-size:12px;color:#A8B8B6;text-align:center;margin-top:20px;">Already have access? <a href="/login/" style="color:#17A39B;font-weight:600;text-decoration:none;">Log in</a></p>
  </div>

  <script>
    async function submitEarlyAccess() {
      const btn = document.getElementById('ea-btn');
      const text = document.getElementById('ea-text');
      const spinner = document.getElementById('ea-spinner');
      const msg = document.getElementById('ea-msg');
      const email = document.getElementById('ea-email').value.trim();
      const name = document.getElementById('ea-name').value.trim();
      const company = document.getElementById('ea-company').value.trim();

      if (!email || !email.includes('@')) {
        msg.textContent = 'Please enter a valid email address.';
        msg.className = 'msg err';
        msg.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      text.classList.add('hidden');
      spinner.classList.remove('hidden');
      msg.classList.add('hidden');

      try {
        const res = await fetch('/api/early-access', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, name, company })
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Request failed');
        msg.textContent = json.message;
        msg.className = 'msg ok';
        document.getElementById('ea-form').reset();
      } catch (err) {
        msg.textContent = err.message || 'Something went wrong. Please try again.';
        msg.className = 'msg err';
      } finally {
        btn.disabled = false;
        text.classList.remove('hidden');
        spinner.classList.add('hidden');
        msg.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
